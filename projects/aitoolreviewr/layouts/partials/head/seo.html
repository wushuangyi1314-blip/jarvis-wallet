{{ if .OutputFormats.Get "JSON" }}
<link rel="search" type="application/opensearchdescription+json" title="{{ .Site.Title }} Search" href="/index.json" />
{{ end }}

{{ if .IsPage }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ .Title }}",
    "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
    "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
    "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
    {{ with .Params.heroImage }}"image": "{{ $.Site.BaseURL }}assets/images/{{ . }}",{{ end }}
    "url": "{{ .Permalink }}",
    "publisher": {
        "@type": "Organization",
        "name": "{{ .Site.Title }}",
        "logo": {
            "@type": "ImageObject",
            "url": "{{ .Site.BaseURL }}assets/images/logo.svg"
        }
    },
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
    }
}
</script>
{{ else }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL }}",
    "description": "{{ .Site.Params.description }}",
    "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ .Site.BaseURL }}search/?q={search_term_string}",
        "query-input": "required name=search_term_string"
    }
}
</script>
{{ end }}

window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-36B2DX5N9K');
</script>
