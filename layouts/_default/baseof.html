<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ with .Title }}{{ . }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">

    {{ block "head" . }}{{ end }}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ .Site.BaseURL }}assets/css/style.css?v=12">

    {{ if .OutputFormats.Get "JSON" }}
    <link rel="search" type="application/opensearchdescription+json" title="{{ .Site.Title }} Search" href="/index.json" />
    {{ end }}

    <!-- JSON-LD Structured Data -->
    {{ if .IsPage }}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{ .Title }}",
        "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
        "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
        "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
        {{ with .Params.heroImage }}"image": "{{ $.Site.BaseURL }}assets/images/{{ . }}",{{ end }}
        "url": "{{ .Permalink }}",
        "publisher": {
            "@type": "Organization",
            "name": "{{ .Site.Title }}",
            "logo": {
                "@type": "ImageObject",
                "url": "{{ .Site.BaseURL }}assets/images/logo.svg"
            }
        },
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{{ .Permalink }}"
        }
    }
    </script>
    {{ else }}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "{{ .Site.Title }}",
        "url": "{{ .Site.BaseURL }}",
        "description": "{{ .Site.Params.description }}",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "{{ .Site.BaseURL }}search/?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    {{ end }}

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-36B2DX5N9K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-36B2DX5N9K');
    </script>
</head>
<body>

    {{ partial "header.html" . }}

    {{ block "main" . }}{{ end }}

    {{ partial "footer.html" . }}

    <!-- Search Index -->
    <script src="{{ .Site.BaseURL }}search-index.js"></script>
    <script src="{{ .Site.BaseURL }}search.js"></script>

    {{ block "scripts" . }}{{ end }}
</body>
</html>
