{{ define "main" }}
<main class="container" style="padding-top: 2rem;">
    <div class="section-header" style="margin-bottom: 2rem;">
        <span class="section-title">🔍 Search AI Tools</span>
    </div>

    <div class="header-search-wrap" style="max-width: 600px; margin: 0 auto 2rem; position: relative;">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-page-input" class="search-input" placeholder="Search AI tools, reviews, comparisons…" autocomplete="off" style="width: 100%; padding: 12px 16px 12px 44px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px;">
        <div id="search-page-results" class="search-results" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; max-height: 400px; overflow-y: auto; display: none; z-index: 100;"></div>
    </div>

    <div id="search-results-container">
        <p style="text-align: center; color: var(--text-light);">Start typing to search all AI tools and reviews…</p>
    </div>
</main>

{{ define "scripts" }}
<script>
(function() {
    var input = document.getElementById('search-page-input');
    var resultsContainer = document.getElementById('search-page-results');
    var resultsDisplay = document.getElementById('search-results-container');

    function renderResults(results) {
        if (!results || results.length === 0) {
            resultsDisplay.innerHTML = '<p style="text-align:center;color:var(--text-light);">No results found. Try different keywords.</p>';
            return;
        }
        var html = '<div style="display:grid;gap:1rem;max-width:800px;margin:0 auto;">';
        results.forEach(function(r) {
            html += '<a href="' + r.permalink + '" style="display:block;padding:1rem;border:1px solid var(--border);border-radius:8px;text-decoration:none;color:inherit;">';
            html += '<h3 style="margin:0 0 0.5rem;">' + r.title + '</h3>';
            html += '<p style="margin:0;color:var(--text-light);font-size:14px;">' + r.description + '</p>';
            html += '</a>';
        });
        html += '</div>';
        resultsDisplay.innerHTML = html;
    }

    if (input && window.searchData) {
        input.addEventListener('input', function() {
            var q = input.value.trim().toLowerCase();
            if (q.length < 2) {
                resultsContainer.style.display = 'none';
                resultsDisplay.innerHTML = '<p style="text-align:center;color:var(--text-light);">Start typing to search…</p>';
                return;
            }
            var results = window.searchData.filter(function(item) {
                return item.title.toLowerCase().indexOf(q) !== -1 ||
                       item.description.toLowerCase().indexOf(q) !== -1 ||
                       (item.content && item.content.toLowerCase().indexOf(q) !== -1);
            }).slice(0, 10);
            renderResults(results);
            resultsContainer.style.display = 'block';
        });
    }
})();
</script>
{{ end }}
{{ end }}
