{{ with .Params.toc }}
<aside class="toc-panel" id="toc-panel">
    <div class="toc-title">📑 Contents</div>
    <nav class="toc-nav" id="toc-nav">
        {{ range . }}
        <a href="#{{ .id }}" class="toc-item" data-id="{{ .id }}">{{ .title }}</a>
        {{ end }}
    </nav>
</aside>
{{ end }}
