{{ if .Params.heroImage }}
<div class="article-hero" style="margin-top:0;">
    <div class="hero-pattern"></div>
    <img src="{{ $.Site.BaseURL }}assets/images/{{ .Params.heroImage }}" alt="{{ .Title }}" style="width:100%;height:100%;object-fit:cover;">
</div>
{{ else }}
<div class="article-hero">
    <div class="hero-pattern"></div>
    <div class="hero-label">Hero Image</div>
</div>
{{ end }}
