<header class="site-header" id="siteHeader">
    <div class="container header-inner">
        <a href="{{ .Site.BaseURL }}" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span>AI ToolSpot</span>
        </a>

        <nav class="nav-links" id="navLinks">
            <a href="{{ .Site.BaseURL }}">Home</a>
            <a href="{{ .Site.BaseURL }}articles/">Reviews</a>
            <a href="{{ .Site.BaseURL }}about/">About</a>
        </nav>

        <div class="header-search-wrap" id="searchWrap">
            <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="Search AI tools…" autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>

        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</header>

<!-- Mobile Nav Drawer -->
<nav class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-header">
        <a href="{{ .Site.BaseURL }}" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span>AI ToolSpot</span>
        </a>
        <button class="close-btn" id="closeNavBtn" aria-label="Close menu">✕</button>
    </div>
    <a href="{{ .Site.BaseURL }}">Home</a>
    <a href="{{ .Site.BaseURL }}articles/">Reviews</a>
    <a href="{{ .Site.BaseURL }}about/">About</a>
</nav>
